<h2>Roles</h2>

<table border="1" width="100%">
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Email</th>
      <th>Company</th>
    </tr>
  </thead>

  <tbody>
     @for (role of roles; track role.id) {
    <tr>
      <td>{{role.id}}</td>
      <td>{{role.name}}</td>
      <td>{{role.email}}</td>
      <td>{{role.company?.name}}</td>
    </tr>
}
  </tbody>
</table>
